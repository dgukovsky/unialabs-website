<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">UNIA Software Factory</title>
  <desc id="desc">Software development, AI, and automation for scalable business operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="65%" stop-color="#e9ecff"/>
      <stop offset="100%" stop-color="#e0f3ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#782efa"/>
      <stop offset="55%" stop-color="#0063e4"/>
      <stop offset="100%" stop-color="#25b2ef"/>
    </linearGradient>
    <filter id="blurShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <ellipse cx="985" cy="95" rx="220" ry="140" fill="#782efa" opacity="0.20" filter="url(#blurShadow)"/>
  <ellipse cx="190" cy="560" rx="240" ry="140" fill="#25b2ef" opacity="0.22" filter="url(#blurShadow)"/>

  <rect x="78" y="64" width="1044" height="502" rx="28" fill="#ffffff" opacity="0.84"/>
  <rect x="80" y="66" width="1040" height="498" rx="26" fill="none" stroke="#dcdfe8"/>

  <g transform="translate(130 124)">
    <text x="0" y="0" fill="#202126" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="1">UNIA</text>
    <text x="270" y="0" fill="#202126" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="48" font-weight="600">Software Factory</text>

    <text x="0" y="110" fill="#2f3138" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="48" font-weight="700">Build. Automate. Scale.</text>
    <text x="0" y="165" fill="#5f6675" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="32" font-weight="500">Mission-critical software, AI and workflow automation for modern operations.</text>

    <g transform="translate(0 235)">
      <rect x="0" y="0" width="184" height="74" rx="18" fill="#202126"/>
      <text x="92" y="47" text-anchor="middle" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="700">Cloud</text>

      <rect x="206" y="0" width="184" height="74" rx="18" fill="#ffffff" stroke="#d7dce8"/>
      <text x="298" y="47" text-anchor="middle" fill="#202126" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="700">AI</text>

      <rect x="412" y="0" width="244" height="74" rx="18" fill="url(#brand)"/>
      <text x="534" y="47" text-anchor="middle" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="700">Automation</text>
    </g>
  </g>

  <g transform="translate(874 338)">
    <rect x="0" y="0" width="220" height="176" rx="22" fill="#f8f9fc" stroke="#e2e6f2"/>
    <text x="26" y="38" fill="#2f3138" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="700">Live KPI</text>

    <rect x="28" y="120" width="20" height="34" rx="8" fill="#7dc3ff"/>
    <rect x="58" y="94" width="20" height="60" rx="8" fill="#60afff"/>
    <rect x="88" y="72" width="20" height="82" rx="8" fill="#4a9bff"/>
    <rect x="118" y="58" width="20" height="96" rx="8" fill="#3c86f3"/>
    <rect x="148" y="42" width="20" height="112" rx="8" fill="#356ee6"/>
    <rect x="178" y="24" width="20" height="130" rx="8" fill="#2f57d2"/>

    <text x="26" y="76" fill="#5f6675" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="600">99.95% uptime</text>
  </g>
